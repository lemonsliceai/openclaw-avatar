name: Publish Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  pull-requests: read

concurrency:
  group: publish-release-${{ github.sha }}
  cancel-in-progress: false

jobs:
  detect:
    name: Detect merged release PR
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      pr_number: ${{ steps.detect.outputs.pr_number }}
      pr_url: ${{ steps.detect.outputs.pr_url }}
      should_publish: ${{ steps.detect.outputs.should_publish }}
      tag: ${{ steps.detect.outputs.tag }}
      version: ${{ steps.detect.outputs.version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Require main branch
        run: test "${GITHUB_REF_NAME}" = "main" || { echo "Run this workflow from the main branch."; exit 1; }

      - name: Detect prepared release PR
        id: detect
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("node:fs");
            const path = require("node:path");

            const packageJsonPath = path.join(process.env.GITHUB_WORKSPACE, "package.json");
            const packageJson = JSON.parse(fs.readFileSync(packageJsonPath, "utf8"));
            const version = packageJson.version;
            const tag = `v${version}`;
            const expectedTitle = `chore: release ${tag}`;

            core.setOutput("version", version);
            core.setOutput("tag", tag);

            const { owner, repo } = context.repo;
            const { data: pulls } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner,
              repo,
              commit_sha: context.sha,
            });

            const pr = pulls.find((candidate) => {
              const body = candidate.body || "";
              return candidate.base.ref === "main"
                && Boolean(candidate.merged_at)
                && candidate.head.ref.startsWith("release/")
                && candidate.title === expectedTitle
                && body.includes("Prepared-Release: true")
                && body.includes(`Release-Version: ${version}`);
            });

            if (!pr) {
              core.notice(`Commit ${context.sha} is not a merged prepared release for ${tag}; skipping publish.`);
              core.setOutput("should_publish", "false");
              return;
            }

            core.info(`Publishing ${tag} from PR #${pr.number} ${pr.html_url}`);
            core.setOutput("pr_number", String(pr.number));
            core.setOutput("pr_url", pr.html_url);
            core.setOutput("should_publish", "true");

  publish:
    name: Tag and publish release
    needs: detect
    if: ${{ needs.detect.outputs.should_publish == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: release
    env:
      AUTH_TOKEN: ${{ secrets.RELEASE_PUSH_TOKEN || github.token }}
      CI: true
      CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ needs.detect.outputs.tag }}
      RELEASE_VERSION: ${{ needs.detect.outputs.version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Require publish secrets
        run: |
          test -n "$CLAWHUB_TOKEN" || { echo "Missing GitHub secret: CLAWHUB_TOKEN"; exit 1; }

      - name: Configure push credentials
        run: git remote set-url origin "https://x-access-token:${AUTH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Verify release version
        run: npm run release:check -- "$RELEASE_TAG"

      - name: Read package metadata
        id: package
        run: echo "name=$(node -p 'require(\"./package.json\").name')" >> "$GITHUB_OUTPUT"

      - name: Create and push release tag
        run: |
          git fetch --tags --force
          existing_commit="$(git ls-remote --tags origin "refs/tags/$RELEASE_TAG" | awk '{print $1}')"

          if [ -n "$existing_commit" ] && [ "$existing_commit" != "$GITHUB_SHA" ]; then
            echo "Tag $RELEASE_TAG already exists on a different commit: $existing_commit"
            exit 1
          fi

          if [ -z "$existing_commit" ]; then
            git tag "$RELEASE_TAG" "$GITHUB_SHA"
            git push origin "refs/tags/$RELEASE_TAG"
          else
            echo "Tag $RELEASE_TAG already points to $GITHUB_SHA."
          fi

      - name: Check whether npm version is already published
        id: npm
        run: |
          if npm view "${{ steps.package.outputs.name }}@$RELEASE_VERSION" version >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: ${{ steps.npm.outputs.already_published != 'true' }}
        run: npm publish --access public

      - name: Install ClawHub CLI
        run: npm install --global clawhub@latest

      - name: Authenticate ClawHub CLI
        run: |
          clawhub --no-input login --token "$CLAWHUB_TOKEN"
          clawhub --no-input whoami

      - name: Publish to ClawHub
        run: clawhub --workdir "$GITHUB_WORKSPACE" --no-input package publish . --family code-plugin --source-repo "${{ github.repository }}" --source-commit "$GITHUB_SHA"

      - name: Create or update GitHub Release
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" --title "$RELEASE_TAG" --latest
          else
            gh release create "$RELEASE_TAG" --title "$RELEASE_TAG" --verify-tag --generate-notes --latest
          fi
