name: Publish Release

on:
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: publish-release-main
  cancel-in-progress: false

jobs:
  publish:
    name: Tag and publish release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: release
    env:
      AUTH_TOKEN: ${{ secrets.RELEASE_PUSH_TOKEN || github.token }}
      CI: true
      CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
      GH_TOKEN: ${{ github.token }}
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Require main branch
        run: test "${GITHUB_REF_NAME}" = "main" || { echo "Run this workflow from the main branch."; exit 1; }

      - name: Read release metadata
        id: release
        run: |
          version="$(node -p 'require("./package.json").version')"
          tag="v$version"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "target_sha=$GITHUB_SHA" >> "$GITHUB_OUTPUT"

      - name: Require publish configuration
        run: |
          test -n "$CLAWHUB_TOKEN" || { echo "Missing GitHub secret: CLAWHUB_TOKEN"; exit 1; }
          if [ -n "$NPM_TOKEN" ]; then
            echo "Using NPM_TOKEN authentication for npm publish."
          else
            echo "NPM_TOKEN not set; npm publish will use GitHub Actions trusted publishing if configured."
          fi

      - name: Configure push credentials
        run: git remote set-url origin "https://x-access-token:${AUTH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Verify release version
        run: npm run release:check -- "${{ steps.release.outputs.tag }}"

      - name: Read package metadata
        id: package
        run: echo "name=$(node -p 'require(\"./package.json\").name')" >> "$GITHUB_OUTPUT"

      - name: Create and push release tag
        run: |
          RELEASE_TAG="${{ steps.release.outputs.tag }}"
          TARGET_SHA="${{ steps.release.outputs.target_sha }}"
          git fetch --tags --force
          existing_commit="$(git ls-remote --tags origin "refs/tags/$RELEASE_TAG" | awk '{print $1}')"

          if [ -n "$existing_commit" ] && [ "$existing_commit" != "$TARGET_SHA" ]; then
            echo "Tag $RELEASE_TAG already exists on a different commit: $existing_commit"
            exit 1
          fi

          if [ -z "$existing_commit" ]; then
            git tag "$RELEASE_TAG" "$TARGET_SHA"
            git push origin "refs/tags/$RELEASE_TAG"
          else
            echo "Tag $RELEASE_TAG already points to $TARGET_SHA."
          fi

      - name: Check whether npm version is already published
        id: npm
        run: |
          if npm view "${{ steps.package.outputs.name }}@${{ steps.release.outputs.version }}" version >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: ${{ steps.npm.outputs.already_published != 'true' }}
        run: |
          if [ -n "$NPM_TOKEN" ]; then
            NODE_AUTH_TOKEN="$NPM_TOKEN" npm publish --access public
          else
            npm publish --access public
          fi

      - name: Install ClawHub CLI
        run: npm install --global clawhub@latest

      - name: Authenticate ClawHub CLI
        run: |
          clawhub --no-input login --token "$CLAWHUB_TOKEN"
          clawhub --no-input whoami

      - name: Publish to ClawHub
        run: clawhub --workdir "$GITHUB_WORKSPACE" --no-input package publish . --family code-plugin --source-repo "${{ github.repository }}" --source-commit "${{ steps.release.outputs.target_sha }}"

      - name: Create or update GitHub Release
        run: |
          RELEASE_TAG="${{ steps.release.outputs.tag }}"
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" --title "$RELEASE_TAG" --latest
          else
            gh release create "$RELEASE_TAG" --title "$RELEASE_TAG" --verify-tag --generate-notes --latest
          fi
