name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Select how to increment the version.
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
          - prerelease
      prerelease_id:
        description: Pre-release identifier to use when release_type is prerelease.
        required: false
        default: beta
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: prepare-release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Bump version and open release PR
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      AUTH_TOKEN: ${{ secrets.RELEASE_PUSH_TOKEN || github.token }}
      CI: true
      GH_TOKEN: ${{ secrets.RELEASE_PUSH_TOKEN || github.token }}
      HAS_RELEASE_PUSH_TOKEN: ${{ secrets.RELEASE_PUSH_TOKEN != '' }}
      PRERELEASE_ID: ${{ inputs.prerelease_id }}
      RELEASE_TYPE: ${{ inputs.release_type }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Require main branch
        run: test "${GITHUB_REF_NAME}" = "main" || { echo "Run this workflow from the main branch."; exit 1; }

      - name: Warn when using default GitHub token
        if: ${{ env.HAS_RELEASE_PUSH_TOKEN != 'true' }}
        run: echo "::warning::RELEASE_PUSH_TOKEN is not configured. The release PR may not trigger follow-on workflows when it is created with GITHUB_TOKEN."

      - name: Ensure no release PR is already open
        uses: actions/github-script@v8
        with:
          github-token: ${{ env.GH_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const { data: pulls } = await github.rest.pulls.list({
              owner,
              repo,
              state: "open",
              base: "main",
              per_page: 100,
            });

            const existing = pulls.find((pull) => pull.head.ref.startsWith("release/"));

            if (existing) {
              core.setFailed(`An open release PR already exists: #${existing.number} ${existing.html_url}`);
            }

      - name: Configure push credentials
        run: git remote set-url origin "https://x-access-token:${AUTH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare release version
        id: version
        run: |
          if [ "$RELEASE_TYPE" = "prerelease" ]; then
            npm version prerelease --preid "$PRERELEASE_ID" --no-git-tag-version
          else
            npm version "$RELEASE_TYPE" --no-git-tag-version
          fi

          version="$(node -p "require('./package.json').version")"
          branch="release/v$version"

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"

      - name: Verify release version
        run: npm run release:check -- "v${{ steps.version.outputs.version }}"

      - name: Run validation
        run: npm run validate

      - name: Ensure release branch does not already exist
        run: |
          if git ls-remote --exit-code --heads origin "${{ steps.version.outputs.branch }}" >/dev/null 2>&1; then
            echo "Release branch ${{ steps.version.outputs.branch }} already exists on origin."
            exit 1
          fi

      - name: Create release branch and commit
        run: |
          git checkout -b "${{ steps.version.outputs.branch }}"
          git add package.json package-lock.json openclaw.plugin.json
          git commit -m 'chore: release v${{ steps.version.outputs.version }}'

      - name: Push release branch
        run: git push --set-upstream origin "${{ steps.version.outputs.branch }}"

      - name: Open release PR
        run: |
          title="chore: release v${{ steps.version.outputs.version }}"
          body="$(cat <<EOF
          Generated by the Prepare Release workflow.

          Prepared-Release: true
          Release-Version: ${{ steps.version.outputs.version }}
          Release-Branch: ${{ steps.version.outputs.branch }}
          EOF
          )"

          gh pr create \
            --base main \
            --head "${{ steps.version.outputs.branch }}" \
            --title "$title" \
            --body "$body"
