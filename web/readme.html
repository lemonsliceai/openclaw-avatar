<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Avatar README</title>
    <link rel="stylesheet" href="/plugins/avatar/styles/base.css" />
    <link rel="stylesheet" href="/plugins/avatar/styles/layout.css" />
    <link rel="stylesheet" href="/plugins/avatar/styles/layout.mobile.css" />
    <link rel="stylesheet" href="/plugins/avatar/styles/components.css" />
    <style>
      .readme-shell .nav {
        border-right: 1px solid var(--border);
      }

      .readme-shell .nav-item {
        text-decoration: none;
      }

      .readme-shell .content {
        max-width: 100%;
        margin: 0;
        overflow: auto;
      }

      .readme-shell .content > * + * {
        margin-top: 16px;
      }

      .readme-page {
        display: grid;
        gap: 16px;
      }

      .readme-intro {
        display: grid;
        gap: 8px;
      }

      .readme-intro p,
      .readme-doc h1,
      .readme-doc h2,
      .readme-doc h3,
      .readme-doc h4,
      .readme-doc h5,
      .readme-doc h6,
      .readme-doc p {
        margin: 0;
      }

      .readme-doc {
        display: grid;
        gap: 14px;
        line-height: 1.65;
      }

      .readme-doc > * + * {
        margin-top: 0;
      }

      .readme-doc h1,
      .readme-doc h2,
      .readme-doc h3,
      .readme-doc h4,
      .readme-doc h5,
      .readme-doc h6 {
        color: var(--text-strong);
        letter-spacing: -0.03em;
      }

      .readme-doc h1 {
        font-size: 28px;
      }

      .readme-doc h2 {
        font-size: 22px;
      }

      .readme-doc h3 {
        font-size: 18px;
      }

      .readme-doc a {
        color: var(--accent-hover);
      }

      .readme-doc img {
        max-width: 100%;
        height: auto;
        border-radius: var(--radius-md);
        border: 1px solid var(--border);
      }

      .readme-doc ul {
        margin: 0;
        padding-left: 22px;
      }

      .readme-doc li + li {
        margin-top: 8px;
      }

      .readme-doc li > p {
        margin-top: 8px;
      }

      .readme-doc pre {
        margin: 0;
        overflow-x: auto;
        padding: 14px 16px;
        border-radius: var(--radius-md);
        border: 1px solid var(--border);
        background: var(--bg-accent);
        box-shadow: inset 0 1px 0 var(--card-highlight);
      }

      .readme-doc code {
        font-family: var(--mono);
        font-size: 0.95em;
      }

      .readme-doc :not(pre) > code {
        padding: 0.14rem 0.38rem;
        border-radius: 6px;
        background: var(--bg-accent);
        border: 1px solid var(--border);
      }

      .readme-doc table {
        width: 100%;
        border-collapse: collapse;
        overflow: hidden;
        border-radius: var(--radius-md);
        border: 1px solid var(--border);
      }

      .readme-doc th,
      .readme-doc td {
        padding: 10px 12px;
        text-align: left;
        border-bottom: 1px solid var(--border);
      }

      .readme-doc thead th {
        background: var(--bg-accent);
        color: var(--text-strong);
      }

      .readme-doc tbody tr:last-child td {
        border-bottom: none;
      }

      .readme-doc > div {
        display: grid;
        gap: 12px;
      }

      .readme-doc iframe {
        width: 100%;
        border: 0;
        border-radius: var(--radius-md);
      }
    </style>
  </head>
  <body class="avatar-shell">
    <div class="shell readme-shell">
      <header
        class="topbar"
        data-shared-topbar
        data-brand-subtitle="Documentation"
        data-status-variant="full"
      ></header>

      <nav class="nav" id="plugin-nav" data-shared-nav data-active-nav="readme"></nav>

      <main class="content">
        <div class="readme-page">
          <header class="content-header">
            <div class="readme-intro">
              <h1 class="page-title">README</h1>
              <p class="page-sub">This page renders the packaged plugin documentation directly inside the Avatar UI.</p>
            </div>
          </header>

          <article class="card readme-doc">
            __README_HTML__
          </article>
        </div>
      </main>
    </div>
    <script>
      __SHARED_SHELL_BOOTSTRAP__
    </script>
    <script type="module" src="/plugins/avatar/app.js?v=__PACKAGE_VERSION__"></script>
  </body>
</html>
